<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Google Drive URLs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .content {
            padding: 40px;
        }

        .url-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .url-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .tracking-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .order-info {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }

        .file-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
        }

        .file-id {
            font-family: monospace;
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #495057;
            margin-bottom: 8px;
            display: inline-block;
        }

        .url-display {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.8rem;
            word-break: break-all;
            margin-bottom: 10px;
            border: 1px solid #dee2e6;
        }

        .btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            margin: 2px;
            display: inline-block;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #3367d6;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .stats {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .stats h3 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }

        .back-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 All Google Drive URLs</h1>
            <p>Clean list of all Google Drive files from your CSV</p>
        </div>
        
        <div class="content">
            <a href="/" class="back-btn">← Back to Main App</a>
            
            <div id="urlsContainer">
                <div class="no-data">
                    <h3>No URLs to display</h3>
                    <p>Please upload a CSV file first from the main page.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get URLs from URL parameters or localStorage
        function loadUrls() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlsData = urlParams.get('data');
            
            if (urlsData) {
                try {
                    const decodedData = decodeURIComponent(urlsData);
                    const parsedData = JSON.parse(decodedData);
                    displayUrls(parsedData);
                } catch (error) {
                    console.error('Error parsing URL data:', error);
                    showNoData();
                }
            } else {
                // Try to get from localStorage as fallback
                const storedData = localStorage.getItem('googleDriveUrls');
                if (storedData) {
                    try {
                        const parsedData = JSON.parse(storedData);
                        displayUrls(parsedData);
                    } catch (error) {
                        console.error('Error parsing stored data:', error);
                        showNoData();
                    }
                } else {
                    showNoData();
                }
            }
        }

        function displayUrls(urlsData) {
            const container = document.getElementById('urlsContainer');
            
            if (!urlsData || urlsData.length === 0) {
                showNoData();
                return;
            }

            // Group URLs by tracking number
            const urlsByTracking = {};
            urlsData.forEach(item => {
                if (!urlsByTracking[item.trackingNumber]) {
                    urlsByTracking[item.trackingNumber] = [];
                }
                urlsByTracking[item.trackingNumber].push(item);
            });

            const totalUrls = urlsData.length;
            const totalOrders = Object.keys(urlsByTracking).length;

            let html = `
                <div class="stats">
                    <h3>📊 Summary</h3>
                    <p><strong>${totalUrls}</strong> Google Drive URLs found across <strong>${totalOrders}</strong> orders</p>
                </div>
                
                <div class="url-grid">
            `;

            // Display each tracking number group
            Object.keys(urlsByTracking).forEach(trackingNumber => {
                const items = urlsByTracking[trackingNumber];
                
                html += `
                    <div class="url-card">
                        <div class="tracking-number">📦 ${trackingNumber}</div>
                        <div class="order-info">Order: ${items[0].orderNumber} | ${items.length} file${items.length > 1 ? 's' : ''}</div>
                `;

                items.forEach((item, index) => {
                    html += `
                        <div class="file-item">
                            <div style="font-weight: bold; margin-bottom: 8px;">File ${index + 1}</div>
                            <div class="file-id">ID: ${item.fileId}</div>
                            <div class="url-display">${item.url}</div>
                            <div>
                                <a href="${item.url}" target="_blank" class="btn">🔗 Open in Drive</a>
                                <a href="https://drive.google.com/uc?export=download&id=${item.fileId}" target="_blank" class="btn btn-success">💾 Download</a>
                                <button onclick="copyToClipboard('${item.url}')" class="btn btn-secondary">📋 Copy</button>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        function showNoData() {
            const container = document.getElementById('urlsContainer');
            container.innerHTML = `
                <div class="no-data">
                    <h3>No URLs to display</h3>
                    <p>Please upload a CSV file first from the main page.</p>
                    <a href="/" class="btn" style="margin-top: 20px;">Go to Main Page</a>
                </div>
            `;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const button = event.target;
                const originalText = button.innerHTML;
                button.innerHTML = '✅ Copied!';
                button.style.background = '#28a745';
                
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.style.background = '#6c757d';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy to clipboard');
            });
        }

        // Load URLs when page loads
        window.addEventListener('load', loadUrls);
    </script>
</body>
</html>
